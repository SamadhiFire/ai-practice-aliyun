<svg width="768" height="1260" viewBox="0 0 768 1260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI牛马刷题个人页预览</title>
  <desc id="desc">展示个人信息、API 配置和 AI 个性化题集分类能力的个人页预览图。</desc>
  <defs>
    <linearGradient id="bg3" x1="50" y1="40" x2="718" y2="1220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCFCFD"/>
      <stop offset="1" stop-color="#F4F7F5"/>
    </linearGradient>
    <linearGradient id="title3" x1="80" y1="0" x2="360" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#16A34A"/>
      <stop offset="1" stop-color="#84CC16"/>
    </linearGradient>
    <filter id="shadow3" x="16" y="16" width="736" height="1228" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#B9C4BC" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="768" height="1260" rx="32" fill="url(#bg3)"/>
  <g filter="url(#shadow3)">
    <rect x="32" y="32" width="704" height="1196" rx="28" fill="#FFFFFF" stroke="#E5E7EB"/>
  </g>

  <text x="70" y="122" font-size="40" font-weight="800" fill="url(#title3)" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">本牛马，天下第一！</text>
  <rect x="486" y="70" width="72" height="72" rx="36" fill="#F0FDF4" stroke="#22C55E" stroke-width="3"/>
  <rect x="568" y="70" width="72" height="72" rx="36" fill="#F0FDF4" stroke="#22C55E" stroke-width="3"/>

  <rect x="70" y="178" width="628" height="170" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
  <circle cx="158" cy="262" r="48" fill="#FAFAFA" stroke="#E5E7EB"/>
  <text x="230" y="272" font-size="28" font-weight="700" fill="#111827" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">三昧真火</text>
  <circle cx="351" cy="258" r="8" fill="#86EFAC"/>

  <rect x="70" y="388" width="628" height="374" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="112" y="452" font-size="28" font-weight="800" fill="#111827" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">API 配置</text>

  <rect x="112" y="492" width="544" height="68" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="134" y="536" font-size="22" fill="#374151" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">千问</text>

  <rect x="112" y="596" width="544" height="84" rx="16" fill="#FAFAFA" stroke="#E5E7EB"/>
  <text x="140" y="650" font-size="24" fill="#6B7280" font-family="monospace">••••••••••••••••</text>
  <text x="112" y="724" font-size="20" fill="#9CA3AF" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">当前品牌已保存：sk-f****cc5</text>

  <rect x="70" y="796" width="628" height="340" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="112" y="860" font-size="28" font-weight="800" fill="#111827" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">AI 个性化题集</text>
  <rect x="112" y="910" width="544" height="170" rx="14" fill="#F8FAFC"/>
  <text x="134" y="968" font-size="22" fill="#6B7280" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">在此输入你想练习的领域（如：互联网运营、Java面试）</text>
  <text x="134" y="1006" font-size="22" fill="#6B7280" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">点击生成后，AI 会自动匹配核心考点，形成个性化题集</text>
  <rect x="112" y="1106" width="544" height="76" rx="18" fill="#FFFFFF" stroke="#22C55E" stroke-width="2"/>
  <text x="384" y="1154" text-anchor="middle" font-size="28" font-weight="800" fill="#16A34A" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">生成个性化题集分类</text>

  <rect x="0" y="1120" width="768" height="140" fill="#FFFFFF"/>
  <line x1="0" y1="1120.5" x2="768" y2="1120.5" stroke="#E5E7EB"/>
  <rect x="118" y="1148" width="44" height="44" rx="10" stroke="#D1D5DB" stroke-width="2"/>
  <rect x="362" y="1148" width="44" height="44" rx="10" stroke="#D1D5DB" stroke-width="2"/>
  <circle cx="606" cy="1170" r="18" stroke="#22C55E" stroke-width="2"/>
  <text x="140" y="1234" text-anchor="middle" font-size="24" fill="#9CA3AF" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">刷题</text>
  <text x="384" y="1234" text-anchor="middle" font-size="24" fill="#9CA3AF" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">题集</text>
  <text x="606" y="1234" text-anchor="middle" font-size="24" font-weight="700" fill="#16A34A" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">我的</text>
</svg>
