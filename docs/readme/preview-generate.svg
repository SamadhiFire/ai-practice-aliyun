<svg width="768" height="1260" viewBox="0 0 768 1260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI牛马刷题首页预览</title>
  <desc id="desc">展示学习材料输入、出题设置和一键生成按钮的首页预览图。</desc>
  <defs>
    <linearGradient id="bg" x1="50" y1="40" x2="718" y2="1220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCFCFD"/>
      <stop offset="1" stop-color="#F2F5F3"/>
    </linearGradient>
    <linearGradient id="brand" x1="140" y1="0" x2="620" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#16A34A"/>
      <stop offset="0.55" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#FB923C"/>
    </linearGradient>
    <filter id="shadow" x="16" y="16" width="736" height="1228" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#B9C4BC" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="768" height="1260" rx="32" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="32" y="32" width="704" height="1196" rx="28" fill="#FFFFFF" stroke="#E5E7EB"/>
  </g>

  <text x="384" y="116" text-anchor="middle" font-size="72" font-weight="800" fill="url(#brand)" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">AI牛马刷题</text>
  <text x="384" y="176" text-anchor="middle" font-size="26" font-weight="600" fill="#4B5563" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">AI负责出题，牛马负责变强，我爱刷题！！！</text>

  <rect x="70" y="230" width="628" height="270" rx="22" fill="#FBFBFB" stroke="#E5E7EB"/>
  <rect x="92" y="248" width="584" height="220" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="384" y="318" text-anchor="middle" font-size="26" fill="#6B7280" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">直接粘贴你的学习材料，或输入你想学的内容</text>
  <text x="384" y="358" text-anchor="middle" font-size="26" fill="#6B7280" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">系统会帮助你快速生成可练习的题目</text>
  <rect x="280" y="388" width="88" height="88" rx="44" fill="#F0FDF4" stroke="#22C55E" stroke-width="3"/>
  <rect x="400" y="388" width="88" height="88" rx="44" fill="#F0FDF4" stroke="#22C55E" stroke-width="3"/>
  <path d="M310 425L330 445L352 414" stroke="#16A34A" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M427 414L447 445L470 425" stroke="#16A34A" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="60" y="540" width="648" height="520" rx="22" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="96" y="594" font-size="30" font-weight="800" fill="#111827" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">出题设置</text>

  <rect x="96" y="642" width="256" height="64" rx="16" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
  <rect x="384" y="642" width="256" height="64" rx="16" fill="#FFFFFF" stroke="#D1D5DB"/>
  <text x="224" y="683" text-anchor="middle" font-size="24" font-weight="700" fill="#16A34A" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">原文提取</text>
  <text x="512" y="683" text-anchor="middle" font-size="24" font-weight="700" fill="#111827" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">知识拓展</text>
  <text x="98" y="736" font-size="20" fill="#9CA3AF" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">题目答案均来自所给材料</text>

  <rect x="96" y="774" width="256" height="64" rx="16" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
  <rect x="384" y="774" width="256" height="64" rx="16" fill="#FFFFFF" stroke="#D1D5DB"/>
  <text x="224" y="815" text-anchor="middle" font-size="24" font-weight="700" fill="#16A34A" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">即时反馈</text>
  <text x="512" y="815" text-anchor="middle" font-size="24" font-weight="700" fill="#111827" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">全做再看</text>

  <rect x="96" y="904" width="180" height="58" rx="16" fill="#FFFFFF" stroke="#D1D5DB"/>
  <rect x="294" y="904" width="180" height="58" rx="16" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
  <rect x="492" y="904" width="148" height="58" rx="16" fill="#FFFFFF" stroke="#D1D5DB"/>
  <text x="186" y="942" text-anchor="middle" font-size="22" font-weight="700" fill="#111827" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">简单</text>
  <text x="384" y="942" text-anchor="middle" font-size="22" font-weight="700" fill="#16A34A" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">中等</text>
  <text x="566" y="942" text-anchor="middle" font-size="22" font-weight="700" fill="#111827" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">困难</text>

  <rect x="104" y="990" width="520" height="84" rx="42" fill="#17C964"/>
  <text x="364" y="1042" text-anchor="middle" font-size="30" font-weight="800" fill="#FFFFFF" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">一键生成</text>

  <rect x="0" y="1120" width="768" height="140" fill="#FFFFFF"/>
  <line x1="0" y1="1120.5" x2="768" y2="1120.5" stroke="#E5E7EB"/>
  <rect x="118" y="1148" width="44" height="44" rx="10" stroke="#22C55E" stroke-width="2"/>
  <rect x="362" y="1148" width="44" height="44" rx="10" stroke="#D1D5DB" stroke-width="2"/>
  <circle cx="606" cy="1170" r="18" stroke="#D1D5DB" stroke-width="2"/>
  <text x="140" y="1234" text-anchor="middle" font-size="24" font-weight="700" fill="#16A34A" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">刷题</text>
  <text x="384" y="1234" text-anchor="middle" font-size="24" fill="#9CA3AF" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">题集</text>
  <text x="606" y="1234" text-anchor="middle" font-size="24" fill="#9CA3AF" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">我的</text>
