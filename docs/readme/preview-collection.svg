<svg width="768" height="1260" viewBox="0 0 768 1260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI牛马刷题题集页预览</title>
  <desc id="desc">展示全部、错题、掌握分类，以及题目卡片和做题视图的题集预览图。</desc>
  <defs>
    <linearGradient id="bg2" x1="50" y1="40" x2="718" y2="1220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCFCFD"/>
      <stop offset="1" stop-color="#F4F7F5"/>
    </linearGradient>
    <filter id="shadow2" x="16" y="16" width="736" height="1228" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#B9C4BC" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="768" height="1260" rx="32" fill="url(#bg2)"/>
  <g filter="url(#shadow2)">
    <rect x="32" y="32" width="704" height="1196" rx="28" fill="#FFFFFF" stroke="#E5E7EB"/>
  </g>

  <text x="102" y="128" font-size="32" font-weight="800" fill="#111827" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">全部</text>
  <text x="236" y="128" font-size="32" font-weight="600" fill="#6B7280" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">错题</text>
  <text x="372" y="128" font-size="32" font-weight="600" fill="#6B7280" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">掌握</text>
  <rect x="70" y="148" width="106" height="5" rx="2.5" fill="#16A34A"/>
  <line x1="32" y1="186.5" x2="736" y2="186.5" stroke="#E5E7EB"/>

  <rect x="62" y="216" width="96" height="50" rx="24" fill="#F0FDF4"/>
  <text x="110" y="248" text-anchor="middle" font-size="22" font-weight="700" fill="#16A34A" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">综合</text>
  <text x="182" y="248" font-size="20" fill="#9CA3AF" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">让AI创建个性化题集分类</text>
  <text x="466" y="248" font-size="20" font-weight="700" fill="#16A34A" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">点击去生成</text>

  <text x="64" y="342" font-size="22" fill="#6B7280" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">第 4 / 190 题</text>
  <text x="538" y="342" font-size="22" fill="#EF4444" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">清空</text>
  <text x="602" y="342" font-size="22" fill="#22C55E" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">已练习 0 次</text>
  <rect x="64" y="360" width="14" height="4" rx="2" fill="#16A34A"/>

  <rect x="124" y="398" width="520" height="726" rx="24" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="160" y="448" font-size="22" fill="#9CA3AF" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">单选题</text>
  <text x="584" y="448" font-size="22" fill="#9CA3AF" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">简单</text>

  <text x="160" y="520" font-size="30" font-weight="800" fill="#111827" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">以下哪类指标属于“互联网变现”的前置驱动因素，</text>
  <text x="160" y="564" font-size="30" font-weight="800" fill="#111827" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">但本身不构成变现结果？</text>

  <rect x="160" y="632" width="448" height="118" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="160" y="776" width="448" height="118" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="160" y="920" width="448" height="118" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="190" y="700" font-size="28" fill="#374151" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">A</text>
  <text x="190" y="844" font-size="28" fill="#374151" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">B</text>
  <text x="190" y="988" font-size="28" fill="#374151" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">C</text>
  <text x="228" y="684" font-size="22" fill="#374151" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">用户完成支付后平台确认的订单实收金额</text>
  <text x="228" y="828" font-size="22" fill="#374151" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">用户注册后首次充值成功的笔数</text>
  <text x="228" y="972" font-size="22" fill="#374151" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">用户在APP内单日平均使用时长（Min）</text>

  <circle cx="82" cy="828" r="30" fill="#FFFFFF" stroke="#E5E7EB"/>
  <path d="M92 828H72M72 828L80 820M72 828L80 836" stroke="#374151" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="686" cy="828" r="30" fill="#FFFFFF" stroke="#E5E7EB"/>
  <path d="M676 828H696M696 828L688 820M696 828L688 836" stroke="#374151" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="0" y="1120" width="768" height="140" fill="#FFFFFF"/>
  <line x1="0" y1="1120.5" x2="768" y2="1120.5" stroke="#E5E7EB"/>
  <rect x="118" y="1148" width="44" height="44" rx="10" stroke="#D1D5DB" stroke-width="2"/>
  <rect x="362" y="1148" width="44" height="44" rx="10" stroke="#22C55E" stroke-width="2"/>
  <circle cx="606" cy="1170" r="18" stroke="#D1D5DB" stroke-width="2"/>
  <text x="140" y="1234" text-anchor="middle" font-size="24" fill="#9CA3AF" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">刷题</text>
  <text x="384" y="1234" text-anchor="middle" font-size="24" font-weight="700" fill="#16A34A" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">题集</text>
  <text x="606" y="1234" text-anchor="middle" font-size="24" fill="#9CA3AF" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">我的</text>
</svg>
